<!doctype html>
<html lang="fa" dir="rtl">
<head>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GN46JLLP0X"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-GN46JLLP0X');
</script>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ایران آزاد</title>

<meta property="og:title" content="FreeIran">
<meta property="og:description" content="Choose your country campaign and support freedom for Iran">
<meta property="og:type" content="website">
<meta property="og:url" content="https://lionsunrevolution2026.github.io/FreeIran/">

<style>
:root{
  --bg0:#07131c;
  --bg1:#0b1d2a;
  --bg2:#061018;
  --card0:#0d2230;
  --card1:#0a1b27;
  --text:#e8f2ff;
  --muted:rgba(232,242,255,.74);
  --border:rgba(255,255,255,.10);
  --accent:#c9a96b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(1200px 700px at 15% 10%, rgba(47,192,214,.10), transparent 55%),
    radial-gradient(900px 600px at 85% 0%, rgba(60,120,255,.10), transparent 50%),
    linear-gradient(180deg,var(--bg1),var(--bg0) 55%,var(--bg2));
  min-height:100vh;
}

.wrap{
  max-width:1180px;
  margin:0 auto;
  padding:40px 18px 60px;
}

.header{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  margin-bottom:8px;
}

.langBtn{
  border:1px solid var(--border);
  background:rgba(255,255,255,.05);
  padding:10px 14px;
  border-radius:14px;
  color:white;
  cursor:pointer;
  font-weight:800;
}

.hero{
  text-align:center;
  margin-bottom:28px;
}

.topBadge{
  display:inline-flex;
  align-items:center;
  gap:14px;
  margin-bottom:16px;
  padding:12px 18px;
  border:1px solid var(--border);
  border-radius:999px;
  background:rgba(255,255,255,.05);
  font-weight:700;
  font-size:44px;
  line-height:1.2;
}

.hero h1{
  margin:0;
  font-size:44px;
  letter-spacing:.4px;
  line-height:1.15;
}

.hero p{
  max-width:820px;
  margin:12px auto 0;
  color:var(--muted);
  line-height:1.8;
  font-size:17px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:18px;
  margin-top:30px;
}

.card{
  display:block;
  text-decoration:none;
  color:inherit;
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
    linear-gradient(180deg, var(--card0), var(--card1));
  box-shadow:0 20px 50px rgba(0,0,0,.38);
  transition:transform .14s ease, border-color .14s ease, box-shadow .14s ease;
}

.card:hover{
  transform:translateY(-4px);
  border-color:rgba(201,169,107,.5);
  box-shadow:0 26px 55px rgba(0,0,0,.48);
}

.flag{
  width:72px;
  height:72px;
  border-radius:16px;
  object-fit:cover;
  display:block;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);
}

.card h2{
  margin:14px 0 8px;
  font-size:24px;
}

.card p{
  margin:0;
  color:var(--muted);
  line-height:1.7;
  min-height:52px;
}

.go{
  margin-top:16px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);
  font-weight:800;
}

.footer{
  margin-top:38px;
  text-align:center;
  color:var(--muted);
  font-size:14px;
}

@media (max-width:700px){
  .topBadge{
    font-size:20px;
    gap:10px;
    padding:10px 14px;
  }
  .hero h1{font-size:42px}
  .hero p{font-size:15px}
}
</style>
</head>
<body>
  <div class="wrap">

    <div class="header">
      <button id="langBtn" class="langBtn" type="button"></button>
    </div>

    <section class="hero">
      <div class="topBadge" id="topBadge">🕊️  پشتیبانی از ایران آزاد </div>
      <h1 id="title">ایران آزاد</h1>
      <p id="subtitle"></p>
    </section>

    <section class="grid">
      <a class="card" href="https://lionsunrevolution2026.github.io/FreeIran-Germany/" target="_blank" rel="noopener" onclick="trackCountryClick('Germany')">
        <img class="flag" src="flags/germany.png" alt="Germany flag">
        <h2 id="germanyTitle"></h2>
        <p id="germanyText"></p>
        <span class="go" id="germanyBtn"></span>
      </a>

      <a class="card" href="https://lionsunrevolution2026.github.io/FreeIran-Italy/" target="_blank" rel="noopener" onclick="trackCountryClick('Italy')">
        <img class="flag" src="flags/italy.png" alt="Italy flag">
        <h2 id="italyTitle"></h2>
        <p id="italyText"></p>
        <span class="go" id="italyBtn"></span>
      </a>

      <a class="card" href="https://lionsunrevolution2026.github.io/FreeIran-UK/" target="_blank" rel="noopener" onclick="trackCountryClick('UK')">
        <img class="flag" src="flags/uk.png" alt="United Kingdom flag">
        <h2 id="ukTitle"></h2>
        <p id="ukText"></p>
        <span class="go" id="ukBtn"></span>
      </a>

      <a class="card" href="https://lionsunrevolution2026.github.io/FreeIran-Spain/" target="_blank" rel="noopener" onclick="trackCountryClick('Spain')">
        <img class="flag" src="flags/spain.png" alt="Spain flag">
        <h2 id="spainTitle"></h2>
        <p id="spainText"></p>
        <span class="go" id="spainBtn"></span>
      </a>

      <a class="card" href="https://lionsunrevolution2026.github.io/FreeIran-Austria/" target="_blank" rel="noopener" onclick="trackCountryClick('Austria')">
        <img class="flag" src="flags/austria.png" alt="Austria flag">
        <h2 id="austriaTitle"></h2>
        <p id="austriaText"></p>
        <span class="go" id="austriaBtn"></span>
      </a>
    </section>

    <div class="footer" id="footerText"></div>
  </div>

<script>
const UI = {
  en: {
    dir:"ltr",
    lang:"en",
    topBadge:"🕊️ Support Freedom for Iran",
    title:"FreeIran",
    subtitle:"Choose your country campaign below. Each page helps you send an email to political representatives in support of the Iranian people, democracy, human rights, and Iran’s territorial integrity.",
    germanyTitle:"Germany",
    germanyText:"Open the Germany campaign page and send an email to German representatives.",
    germanyBtn:"Open campaign →",
    italyTitle:"Italy",
    italyText:"Open the Italy campaign page and send an email to members of the Italian Parliament.",
    italyBtn:"Open campaign →",
    ukTitle:"United Kingdom",
    ukText:"Open the UK campaign page and send an email to British representatives.",
    ukBtn:"Open campaign →",
    spainTitle:"Spain",
    spainText:"Open the Spain campaign page and send an email to Spanish representatives.",
    spainBtn:"Open campaign →",
    austriaTitle:"Austria",
    austriaText:"Open the Austria campaign page and send an email to Austrian representatives.",
    austriaBtn:"Open campaign →",
    footer:"FreeIran project • GitHub Pages",
    toggle:"🌐 فارسی"
  },

  fa: {
    dir:"rtl",
    lang:"fa",
    topBadge:"🕊️ ایران آزاد",
    title:"ایران آزاد",
    subtitle:"کشور مورد نظر خود را در پایین انتخاب کنید. هر صفحه به شما کمک می‌کند ایمیلی آماده برای نمایندگان سیاسی در حمایت از مردم ایران، دموکراسی، حقوق بشر و تمامیت ارضی ایران ارسال کنید.",
    germanyTitle:"آلمان",
    germanyText:"صفحه کمپین آلمان را باز کنید و به نمایندگان آلمان ایمیل بفرستید.",
    germanyBtn:"باز کردن کمپین ←",
    italyTitle:"ایتالیا",
    italyText:"صفحه کمپین ایتالیا را باز کنید و به اعضای پارلمان ایتالیا ایمیل بفرستید.",
    italyBtn:"باز کردن کمپین ←",
    ukTitle:"بریتانیا",
    ukText:"صفحه کمپین بریتانیا را باز کنید و به نمایندگان بریتانیا ایمیل بفرستید.",
    ukBtn:"باز کردن کمپین ←",
    spainTitle:"اسپانیا",
    spainText:"صفحه کمپین اسپانیا را باز کنید و به نمایندگان اسپانیا ایمیل بفرستید.",
    spainBtn:"باز کردن کمپین ←",
    austriaTitle:"اتریش",
    austriaText:"صفحه کمپین اتریش را باز کنید و به نمایندگان اتریش ایمیل بفرستید.",
    austriaBtn:"باز کردن کمپین ←",
    footer:"پروژه FreeIran • ساخته‌شده با GitHub Pages",
    toggle:"🌐 English"
  }
};

let LANG = "fa";

function setLang(lang){
  LANG = lang;
  const t = UI[lang];

  document.documentElement.lang = t.lang;
  document.documentElement.dir = t.dir;
  document.title = t.title;

  document.getElementById("topBadge").textContent = t.topBadge;
  document.getElementById("title").textContent = t.title;
  document.getElementById("subtitle").textContent = t.subtitle;

  document.getElementById("germanyTitle").textContent = t.germanyTitle;
  document.getElementById("germanyText").textContent = t.germanyText;
  document.getElementById("germanyBtn").textContent = t.germanyBtn;

  document.getElementById("italyTitle").textContent = t.italyTitle;
  document.getElementById("italyText").textContent = t.italyText;
  document.getElementById("italyBtn").textContent = t.italyBtn;

  document.getElementById("ukTitle").textContent = t.ukTitle;
  document.getElementById("ukText").textContent = t.ukText;
  document.getElementById("ukBtn").textContent = t.ukBtn;

  document.getElementById("spainTitle").textContent = t.spainTitle;
  document.getElementById("spainText").textContent = t.spainText;
  document.getElementById("spainBtn").textContent = t.spainBtn;

  document.getElementById("austriaTitle").textContent = t.austriaTitle;
  document.getElementById("austriaText").textContent = t.austriaText;
  document.getElementById("austriaBtn").textContent = t.austriaBtn;

  document.getElementById("footerText").textContent = t.footer;
  document.getElementById("langBtn").textContent = t.toggle;
}

document.getElementById("langBtn").addEventListener("click", () => {
  const next = LANG === "en" ? "fa" : "en";

  if (typeof gtag === "function") {
    gtag("event", "language_switch", {
      event_category: "engagement",
      from_language: LANG,
      to_language: next,
      page_name: "freeiran_home"
    });
  }

  setLang(next);
});

function trackCountryClick(country){
  if (typeof gtag !== "function") return;
  gtag("event", "country_card_click", {
    event_category: "navigation",
    event_label: country,
    country_name: country,
    language: LANG,
    page_name: "freeiran_home"
  });
}

setLang("fa");
</script>
</body>
</html>
