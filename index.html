<style>
:root{
  --bg0:#07131c;
  --bg1:#0b1d2a;
  --bg2:#061018;
  --card0:#0d2230;
  --card1:#0a1b27;
  --text:#e8f2ff;
  --muted:rgba(232,242,255,.74);
  --border:rgba(255,255,255,.10);
  --accent:#c9a96b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(1200px 700px at 15% 10%, rgba(47,192,214,.10), transparent 55%),
    radial-gradient(900px 600px at 85% 0%, rgba(60,120,255,.10), transparent 50%),
    linear-gradient(180deg,var(--bg1),var(--bg0) 55%,var(--bg2));
  min-height:100vh;
}

.wrap{
  max-width:1180px;
  margin:0 auto;
  padding:40px 18px 60px;
}

.header{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  margin-bottom:8px;
}

.langBtn{
  border:1px solid var(--border);
  background:rgba(255,255,255,.05);
  padding:10px 14px;
  border-radius:14px;
  color:white;
  cursor:pointer;
  font-weight:800;
}

.hero{
  text-align:center;
  margin-bottom:28px;
}

/* BIGGER BADGE */
.topBadge{
  display:inline-flex;
  align-items:center;
  gap:18px;
  margin-bottom:16px;
  padding:16px 24px;
  border:1px solid var(--border);
  border-radius:999px;
  background:rgba(255,255,255,.05);
  font-weight:700;
  font-size:44px;
  line-height:1;
}

/* TITLE SMALLER THAN BADGE */
.hero h1{
  margin:0;
  font-size:44px;
  letter-spacing:.4px;
}

.hero p{
  max-width:820px;
  margin:12px auto 0;
  color:var(--muted);
  line-height:1.8;
  font-size:17px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:18px;
  margin-top:30px;
}

.card{
  display:block;
  text-decoration:none;
  color:inherit;
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
    linear-gradient(180deg, var(--card0), var(--card1));
  box-shadow:0 20px 50px rgba(0,0,0,.38);
  transition:transform .14s ease, border-color .14s ease, box-shadow .14s ease;
}

.card:hover{
  transform:translateY(-4px);
  border-color:rgba(201,169,107,.5);
  box-shadow:0 26px 55px rgba(0,0,0,.48);
}

.flag{
  width:72px;
  height:72px;
  border-radius:16px;
  object-fit:cover;
  display:block;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);
}

.card h2{
  margin:14px 0 8px;
  font-size:24px;
}

.card p{
  margin:0;
  color:var(--muted);
  line-height:1.7;
  min-height:52px;
}

.go{
  margin-top:16px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);
  font-weight:800;
}

.footer{
  margin-top:38px;
  text-align:center;
  color:var(--muted);
  font-size:14px;
}

@media (max-width:700px){

  .topBadge{
    font-size:42px;
    padding:12px 18px;
  }

  .hero h1{
    font-size:30px;
  }

  .hero p{
    font-size:15px;
  }
}
</style>
</head>
<body>

    <section class="hero">

      <h1 id="title">ایران آزاد</h1>

    <div class="footer" id="footerText"></div>
  </div>
